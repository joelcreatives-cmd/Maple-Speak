# Publishes the Maple Speak web app (the public/ folder) to GitHub Pages.
# Runs on every push to the default branch. The app is fully client-side, so
# there's nothing to build — we just upload public/ as a static site.

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/english-speaking-practice-app-wJiR3
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site (public/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
