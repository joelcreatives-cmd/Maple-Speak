<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maple Speak</title>
    <!-- The app lives in /public. When GitHub Pages serves the repo root
         ("Deploy from a branch → / (root)"), send visitors into the app. -->
    <meta http-equiv="refresh" content="0; url=./public/" />
    <link rel="canonical" href="./public/" />
    <script>
      // Fast client-side redirect (preserves any query/hash).
      location.replace("./public/" + location.search + location.hash);
    </script>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, sans-serif;
        background: #f4f1ea;
        color: #2c2a26;
      }
      a {
        color: #c2541f;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <p>
      🍁 Taking you to Maple Speak… If nothing happens,
      <a href="./public/">tap here to open the app</a>.
    </p>
  </body>
</html>
